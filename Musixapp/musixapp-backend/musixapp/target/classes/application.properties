spring.application.name=musixapp

# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/musixapp_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
# 'update' automatically creates/updates tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# FILE UPLOAD CONFIG (Crucial for Music)
# ===============================
# Increase max file size (Default is 1MB, which is too small for MP3s)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ===============================
# JWT & SECURITY CONFIG
# ===============================
# Custom property for your JWT Secret (used in JwtUtils.java)
musixapp.jwt.secret=yourVeryLongSecretKeyThatIsSecureAndHardToGuess1234567890
musixapp.jwt.expirationMs=86400000

# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
